spring.application.name=safernest-backend

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${PORT:8081}

jwt.secret=${JWT_SECRET:c2FmZXJuZXN0LXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5nLTEyMzQ1Njc4OTA=}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://*.vercel.app,https://*.onrender.com}

app.seed.enabled=${APP_SEED_ENABLED:false}

openai.api-key=${OPENAI_API_KEY}
openai.base-url=${OPENAI_BASE_URL:https://api.openai.com}
openai.model=${OPENAI_MODEL:gpt-4o-mini}
openai.max-tokens=${OPENAI_MAX_TOKENS:120}
